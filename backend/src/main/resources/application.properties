quarkus.datasource.db-kind=postgresql
quarkus.datasource.username=autoflex
quarkus.datasource.password=autoflex
quarkus.datasource.jdbc.url=jdbc:postgresql://localhost:5432/autoflex

quarkus.hibernate-orm.database.generation=update

quarkus.flyway.migrate-at-start=true
quarkus.flyway.locations=db/migration

quarkus.http.port=8080

mp.jwt.verify.publickey.location=publicKey.pem
mp.jwt.verify.issuer=autoflex-api
smallrye.jwt.sign.key.location=privateKey.pem

quarkus.hibernate-orm.log.sql=true
quarkus.hibernate-orm.format-sql=true

quarkus.http.cors.enabled=true
quarkus.http.cors.origins=http://localhost:5173
quarkus.http.cors.methods=GET,POST,PUT,DELETE,OPTIONS
quarkus.http.cors.headers=accept,authorization,content-type,x-requested-with
